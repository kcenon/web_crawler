version: 2

updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "component:infra"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "component:infra"
    commit-message:
      prefix: "chore(ci)"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/python"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "component:infra"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5

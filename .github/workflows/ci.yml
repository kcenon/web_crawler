name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - uses: bufbuild/buf-setup-action@v1

      - name: Generate protobuf code
        run: buf generate
        working-directory: api/proto

      - name: Build
        run: go build ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - uses: bufbuild/buf-setup-action@v1

      - name: Generate protobuf code
        run: buf generate
        working-directory: api/proto

      - name: Test
        run: go test ./...

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - uses: bufbuild/buf-setup-action@v1

      - name: Generate protobuf code
        run: buf generate
        working-directory: api/proto

      - name: Integration tests
        run: go test -tags integration -timeout 5m ./pkg/frontier/... ./pkg/storage/...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - uses: bufbuild/buf-setup-action@v1

      - name: Generate protobuf code
        run: buf generate
        working-directory: api/proto

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: bufbuild/buf-setup-action@v1

      - name: Lint protos
        run: buf lint
        working-directory: api/proto

      - name: Generate protos
        run: buf generate
        working-directory: api/proto

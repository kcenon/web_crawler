name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan every Monday at 09:07 KST (00:07 UTC)
    - cron: "7 0 * * 1"

permissions:
  contents: read

jobs:
  govulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: bufbuild/buf-setup-action@v1

      - name: Generate protobuf code
        run: buf generate
        working-directory: api/proto

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  gosec:
    name: Go Security Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: bufbuild/buf-setup-action@v1

      - name: Generate protobuf code
        run: buf generate
        working-directory: api/proto

      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: -exclude-dir=pkg/server/pb -severity=medium ./...

version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - misspell
    - revive
    - gosec
  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"

formatters:
  enable:
    - gofmt
    - goimports

run:
  timeout: 5m

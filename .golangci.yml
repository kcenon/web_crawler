version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - misspell
    - revive
    - gosec
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Closer).Close
        - (*os.File).Close
    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
  exclusions:
    paths:
      - examples
      - ".*_test\\.go"
      - internal/testutil

formatters:
  enable:
    - gofmt
    - goimports

run:
  timeout: 5m

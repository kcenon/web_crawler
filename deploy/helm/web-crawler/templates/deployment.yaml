apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "web-crawler.fullname" . }}
  labels:
    {{- include "web-crawler.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "web-crawler.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "web-crawler.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - run
            - --mode=worker
          env:
            - name: KAFKA_BROKERS
              value: {{ join "," .Values.kafka.brokers | quote }}
            - name: KAFKA_TASK_TOPIC
              value: {{ .Values.kafka.taskTopic | quote }}
            - name: KAFKA_DLQ_TOPIC
              value: {{ .Values.kafka.dlqTopic | quote }}
            - name: KAFKA_CONTROL_TOPIC
              value: {{ .Values.kafka.controlTopic | quote }}
            - name: KAFKA_CONSUMER_GROUP
              value: {{ .Values.kafka.consumerGroup | quote }}
            - name: WORKER_CONCURRENCY
              value: {{ .Values.worker.concurrency | quote }}
            - name: WORKER_MAX_RETRIES
              value: {{ .Values.worker.maxRetries | quote }}
          ports:
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.metrics.path }}
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: {{ .Values.metrics.path }}
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
